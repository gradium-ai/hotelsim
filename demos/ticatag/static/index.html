<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticatag — Support Technique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #0079C1;
    --blue-dark: #005A91;
    --blue-light: #E6F2FA;
    --white: #FFFFFF;
    --gray-50: #F7F9FB;
    --gray-100: #EEF2F5;
    --gray-200: #E0E6EB;
    --gray-500: #6B7682;
    --gray-900: #14202B;
    --green: #2BA84A;
    --red: #D64545;
    --shadow-sm: 0 1px 2px rgba(20,32,43,0.06);
    --shadow-md: 0 4px 16px rgba(20,32,43,0.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    font-size: 14px;
    line-height: 1.5;
  }

  /* --------- Layout --------- */
  .app { display: grid; grid-template-rows: 64px 1fr; height: 100vh; }

  header.topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand img { height: 36px; width: auto; }
  .brand .label {
    font-weight: 600; color: var(--gray-500);
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em;
    border-left: 1px solid var(--gray-200); padding-left: 12px;
  }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .phone-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--blue-light); color: var(--blue-dark);
    padding: 6px 12px; border-radius: 999px;
    font-weight: 500; font-size: 13px;
  }
  .phone-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gray-500); }
  .phone-pill.ready .dot { background: var(--green); }
  .status {
    font-size: 12px; color: var(--gray-500);
    display: flex; align-items: center; gap: 6px;
  }
  .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-500); }
  .status.connecting .dot { background: #E0A82E; }
  .status.connected .dot { background: var(--green); }
  .status.error .dot { background: var(--red); }

  main {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 16px;
    padding: 16px;
    overflow: hidden;
  }

  .panel {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--gray-200);
    font-weight: 600;
    font-size: 13px;
    color: var(--gray-900);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-body { flex: 1; overflow: auto; padding: 16px 18px; }

  /* --------- Left: call --------- */
  .call-controls {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--gray-200);
  }
  .mic-btn {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--blue); color: white;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(0,121,193,0.35);
    transition: background 0.15s, transform 0.1s;
  }
  .mic-btn:hover { background: var(--blue-dark); }
  .mic-btn:active { transform: scale(0.96); }
  .mic-btn.active { background: var(--red); box-shadow: 0 4px 12px rgba(214,69,69,0.35); }
  .mic-btn svg { width: 24px; height: 24px; }
  .call-meta { display: flex; flex-direction: column; gap: 2px; }
  .call-meta .title { font-weight: 600; font-size: 14px; }
  .call-meta .subtitle { font-size: 12px; color: var(--gray-500); }
  .call-options {
    margin-left: auto;
    display: flex; align-items: center; gap: 14px;
    font-size: 12px; color: var(--gray-500);
  }
  .call-options label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

  .transcript { display: flex; flex-direction: column; gap: 10px; }
  .msg {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.45;
    word-wrap: break-word;
  }
  .msg-user {
    align-self: flex-end;
    background: var(--blue);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg-agent {
    align-self: flex-start;
    background: var(--gray-100);
    color: var(--gray-900);
    border-bottom-left-radius: 4px;
  }
  .empty-state {
    color: var(--gray-500);
    font-size: 13px;
    text-align: center;
    padding: 32px 16px;
  }
  .phone-call-banner {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 12px;
    border-radius: 8px;
    background: var(--blue-light);
    border: 1px solid #b3d9f2;
    color: var(--blue-dark);
    font-size: 12px;
    font-weight: 600;
    align-self: center;
    margin: 4px 0 6px;
    letter-spacing: 0.02em;
  }

  /* --------- Right: tickets --------- */
  .ticket {
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    background: var(--white);
    transition: border-color 0.15s;
  }
  .ticket:hover { border-color: var(--blue); }
  .ticket.new { animation: flash 1.6s ease-out; }
  @keyframes flash {
    0% { background: var(--blue-light); border-color: var(--blue); }
    100% { background: var(--white); border-color: var(--gray-200); }
  }
  .ticket-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .ticket-key {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 600;
    color: var(--blue-dark);
    font-size: 13px;
  }
  .ticket-key a { color: inherit; text-decoration: none; }
  .ticket-key a:hover { text-decoration: underline; }
  .ticket-status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--gray-100);
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .ticket-summary { font-size: 13px; color: var(--gray-900); }

  .refresh-btn {
    background: none; border: none; cursor: pointer;
    color: var(--gray-500); padding: 4px;
    display: flex; align-items: center;
  }
  .refresh-btn:hover { color: var(--blue); }
  .refresh-btn svg { width: 16px; height: 16px; }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <img src="/static/logo.avif" alt="Ticatag">
      <span class="label">Support Technique · Voice Agent</span>
    </div>
    <div class="topbar-right">
      <div class="phone-pill" id="phonePill">
        <span class="dot"></span>
        <span id="phoneNumber">📞 Numéro à provisionner</span>
      </div>
      <div class="status" id="status">
        <span class="dot"></span><span class="text">Inactif</span>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="call-controls">
        <button class="mic-btn" id="micBtn" aria-label="Démarrer l'appel">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
        </button>
        <div class="call-meta">
          <div class="title" id="callTitle">Démarrer l'appel</div>
          <div class="subtitle" id="callSubtitle">Cliquez sur le micro pour parler à l'agent</div>
        </div>
        <div class="call-options">
          <label><input type="checkbox" id="echoCancellation" checked> Anti-écho</label>
        </div>
      </div>
      <div class="panel-body">
        <div class="transcript" id="transcript">
          <div class="empty-state">La transcription apparaîtra ici une fois l'appel démarré.</div>
        </div>
      </div>
    </section>

    <aside class="panel">
      <div class="panel-header">
        <span>Tickets Jira récents</span>
        <button class="refresh-btn" id="refreshBtn" aria-label="Rafraîchir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
      <div class="panel-body">
        <div id="ticketsList">
          <div class="empty-state">Aucun ticket pour le moment.</div>
        </div>
      </div>
    </aside>
  </main>
</div>

<script>
(function() {
  // ----- Gradium badge dismiss -----
  const badge = document.getElementById('gradium-badge');
  const badgeClose = document.getElementById('gradium-badge-close');
  if (badgeClose && badge) {
    badgeClose.addEventListener('click', () => badge.classList.add('hidden'));
  }

  // ----- DOM refs -----
  const micBtn = document.getElementById('micBtn');
  const echoCb = document.getElementById('echoCancellation');
  const transcript = document.getElementById('transcript');
  const statusEl = document.getElementById('status');
  const callTitle = document.getElementById('callTitle');
  const callSubtitle = document.getElementById('callSubtitle');
  const ticketsList = document.getElementById('ticketsList');
  const refreshBtn = document.getElementById('refreshBtn');

  // ----- State -----
  let ws = null;
  let player = null;
  let isRecording = false;
  let turnBubbles = {};
  let userBubble = null;
  let hadAssistantBubble = false;
  let knownTicketKeys = new Set();
  let currentPhoneStreamId = null;

  // ----- Status helpers -----
  function setStatus(state, text) {
    statusEl.className = 'status ' + state;
    statusEl.querySelector('.text').textContent = text;
  }
  function setCallMeta(title, subtitle) {
    callTitle.textContent = title;
    callSubtitle.textContent = subtitle;
  }

  // ----- Transcript -----
  function clearEmptyState() {
    const empty = transcript.querySelector('.empty-state');
    if (empty) empty.remove();
  }
  function getBubbleForTurn(turnIdx, isUser) {
    clearEmptyState();
    if (isUser) {
      if (userBubble && !hadAssistantBubble) return userBubble;
      hadAssistantBubble = false;
      userBubble = document.createElement('div');
      userBubble.className = 'msg msg-user';
      const tx = document.createElement('span');
      tx.className = 'msg-text';
      userBubble.appendChild(tx);
      transcript.appendChild(userBubble);
      return userBubble;
    }
    let bubble = turnBubbles[turnIdx];
    if (!bubble) {
      hadAssistantBubble = true;
      bubble = document.createElement('div');
      bubble.className = 'msg msg-agent';
      const tx = document.createElement('span');
      tx.className = 'msg-text';
      bubble.appendChild(tx);
      transcript.appendChild(bubble);
      turnBubbles[turnIdx] = bubble;
    }
    return bubble;
  }
  function appendTranscript(text, turnIdx, isUser) {
    const bubble = getBubbleForTurn(turnIdx, isUser);
    bubble.querySelector('.msg-text').textContent += text + ' ';
    while (transcript.children.length > 60) {
      const removed = transcript.removeChild(transcript.firstChild);
      for (const k in turnBubbles) { if (turnBubbles[k] === removed) delete turnBubbles[k]; }
      if (userBubble === removed) userBubble = null;
    }
    // The actual scroll container is the .panel-body wrapper, not .transcript itself.
    const scroller = transcript.parentElement;
    if (scroller) scroller.scrollTop = scroller.scrollHeight;
  }
  function resetTranscript() {
    transcript.innerHTML = '<div class="empty-state">La transcription apparaîtra ici une fois l\'appel démarré.</div>';
    turnBubbles = {};
    userBubble = null;
    hadAssistantBubble = false;
  }
  function ensurePhoneBanner(streamId) {
    if (currentPhoneStreamId === streamId) return;
    currentPhoneStreamId = streamId;
    clearEmptyState();
    const banner = document.createElement('div');
    banner.className = 'phone-call-banner';
    banner.innerHTML = '📞 <span>Appel entrant</span>';
    transcript.appendChild(banner);
    const scroller = transcript.parentElement;
    if (scroller) scroller.scrollTop = scroller.scrollHeight;
  }

  // ----- Tickets -----
  function renderTickets(tickets, opts = {}) {
    if (!tickets || tickets.length === 0) {
      ticketsList.innerHTML = '<div class="empty-state">Aucun ticket pour le moment.</div>';
      return;
    }
    const flashKey = opts.flashKey || null;
    ticketsList.innerHTML = tickets.map(t => `
      <div class="ticket${t.key === flashKey ? ' new' : ''}">
        <div class="ticket-head">
          <span class="ticket-key"><a href="${t.url}" target="_blank" rel="noopener">${t.key}</a></span>
          <span class="ticket-status">${t.status || 'Nouveau'}</span>
        </div>
        <div class="ticket-summary">${escapeHtml(t.summary || '')}</div>
      </div>
    `).join('');
    tickets.forEach(t => knownTicketKeys.add(t.key));
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  async function refreshTickets(flashKey = null) {
    refreshBtn.classList.add('spinning');
    try {
      const r = await fetch('/api/tickets');
      const tickets = await r.json();
      renderTickets(tickets, { flashKey });
    } catch (e) {
      console.warn('Ticket refresh failed', e);
    } finally {
      setTimeout(() => refreshBtn.classList.remove('spinning'), 300);
    }
  }
  refreshBtn.addEventListener('click', () => refreshTickets());

  // ----- Custom WS events -----
  function handleCustomEvent(msg) {
    if (msg.type === 'ticket_created' && msg.ticket) {
      refreshTickets(msg.ticket.key);
    }
  }

  // ----- Call flow -----
  async function startCall() {
    micBtn.classList.add('active');
    setStatus('connecting', 'Connexion…');
    setCallMeta('Appel en cours', 'Parlez après le bip');
    resetTranscript();

    try {
      const audioConfig = await fetch('/api/audio-config').then(r => r.json());

      player = new SyncedAudioPlayer({
        basePath: '/static/js',
        sampleRate: 24000,
        pcmOutput: audioConfig.pcm || false,
        echoCancellation: echoCb.checked,
        onEncodedAudio: (opusData) => {
          if (isRecording && ws?.readyState === WebSocket.OPEN) {
            ws.send(opusData);
          }
        },
        onText: ({ text, turnIdx, isUser }) => {
          appendTranscript(text, turnIdx, isUser);
        },
        onEvent: (eventType, msg) => {
          handleCustomEvent(msg);
        },
      });

      await player.start();

      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}/ws/chat`;
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'start', speed: 1.0 }));
        isRecording = true;
        setStatus('connected', 'En appel');
      };
      ws.onmessage = (event) => player.handleMessage(event.data);
      ws.onclose = () => endCall();
      ws.onerror = () => setStatus('error', 'Erreur de connexion');
    } catch (e) {
      console.error(e);
      setStatus('error', 'Échec du démarrage');
      micBtn.classList.remove('active');
    }
  }

  function endCall() {
    isRecording = false;
    if (ws?.readyState === WebSocket.OPEN) {
      try { ws.send(JSON.stringify({ type: 'stop' })); } catch (_) {}
    }
    ws?.close();
    ws = null;
    player?.stop();
    player = null;
    micBtn.classList.remove('active');
    setStatus('', 'Inactif');
    setCallMeta('Démarrer l\'appel', 'Cliquez sur le micro pour parler à l\'agent');
    refreshTickets();
  }

  micBtn.addEventListener('click', () => {
    if (isRecording) endCall(); else startCall();
  });

  // Initial ticket load + periodic background refresh
  refreshTickets();
  setInterval(() => { if (!isRecording) refreshTickets(); }, 30000);

  // ----- Phone-call SSE: live transcript from inbound Twilio calls -----
  (function setupPhoneEvents() {
    const sse = new EventSource('/api/phone-events');
    sse.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch (_) { return; }

      if (msg.type === 'phone_stt') {
        ensurePhoneBanner(msg.stream_id);
        appendTranscript(msg.text, null, true);
      } else if (msg.type === 'phone_tts') {
        ensurePhoneBanner(msg.stream_id);
        appendTranscript(msg.text, msg.turn_idx ?? null, false);
      } else if (msg.type === 'ticket_created' && msg.ticket) {
        refreshTickets(msg.ticket.key);
      }
    };
    sse.onerror = () => {
      // Browser will auto-reconnect; nothing to do here.
    };
  })();
})();
</script>
</body>
</html>
